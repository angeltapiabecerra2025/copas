<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#f5f5f5;color:#1a1a1a;min-height:100vh}
h1,h2,h3{font-family:'Outfit',sans-serif}
.nav{background:#fff;padding:12px 3%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:999}
.nav .logo{font-size:1.4rem;font-weight:800;color:#1a237e;cursor:pointer;display:flex;align-items:center;gap:8px}
.wrap{max-width:1700px;margin:0 auto;padding:25px 15px}
.btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-p{background:linear-gradient(135deg,#1a237e,#283593);color:#fff}
.btn-o{background:#f0f4ff;color:#1a237e;border:1.5px solid #c5cae9}
.btn-s{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff}
.btn-g{background:linear-gradient(135deg,#00695c,#00897b);color:#fff}
.btn-r{background:linear-gradient(135deg,#c62828,#e53935);color:#fff}

@media print {
  .nav, .btn, .rd-lb, .bk-bg-overlay > div:first-child { display: none !important; }
  body { background: white !important; }
  .bk-bg { background: none !important; height: auto !important; padding: 0 !important; }
  .bk-bg-overlay { background: none !important; padding: 0 !important; }
  .bk-wrap { transform: none !important; margin: 0 !important; }
  .mc { border: 1px solid #ddd !important; box-shadow: none !important; }
}

/* HOME GRID */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:40px}
.tc{background:#fff;border-radius:20px;padding:35px 25px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.06);cursor:pointer;transition:all .3s;border:2px solid transparent;display:flex;flex-direction:column;justify-content:space-between;height:100%}
.tc:hover{transform:translateY(-8px);border-color:#1a237e}
.tc .ti{height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.tc .ti img{max-height:100%;max-width:100%;object-fit:contain;filter:drop-shadow(0 8px 16px rgba(0,0,0,.15))}
.tc h3{font-size:1.3rem;color:#1a237e;margin-bottom:6px}
.tc p{color:#888;font-size:.8rem;margin-bottom:18px}

/* SELECT */
.sp{background:#fff;border-radius:20px;padding:25px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;max-height:55vh;overflow-y:auto;margin-top:20px;padding:5px}
.si{padding:10px 14px;border-radius:12px;border:1px solid #e0e0e0;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.si:hover{background:#f0f0f0}.si.on{background:#1a237e;color:#fff;border-color:#1a237e}
.fl{width:24px;height:17px;object-fit:cover;border-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,.1)}

/* BRACKET BACKGROUNDS */
.bk-bg{min-height:100vh;background-size:cover;background-position:center;background-attachment:fixed;padding:20px 0;overflow-x:auto;display:flex;flex-direction:column}
.bk-bg-overlay{background:rgba(255,255,255,0.85);padding:20px;border-radius:16px;min-width:fit-content;margin:auto}

/* BRACKET */
.bk-wrap{display:flex;align-items:center;justify-content:start;gap:15px;padding:30px;min-width:1150px}
.bk-side{display:flex;align-items:center;gap:25px;flex-shrink:0}
.bk-side.rev{flex-direction:row-reverse}
.rd{display:flex;flex-direction:column;gap:28px;justify-content:center;flex-shrink:0}
.rd-lb{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#444;text-align:center;margin-bottom:12px}
.mc{background:rgba(255,255,255,0.95);border-radius:10px;width:170px;box-shadow:0 3px 8px rgba(0,0,0,.12);border:1px solid #ddd;overflow:hidden;flex-shrink:0}
.tr{padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;height:42px;border-bottom:1px solid #eee;transition:all .15s}
.tr:last-child{border-bottom:none}
.tr:hover{background:#f0f0f0}
.tr.w{background:#e8f0fe;color:#1a73e8;font-weight:700;border-left:3px solid #1a73e8}
.tn{font-size:.75rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fl{width:24px;height:24px;object-fit:contain;border-radius:4px}

/* PODIUM */
.pod{display:flex;flex-direction:column;align-items:center;gap:25px;width:320px;padding:0 15px;flex-shrink:0}
.pod-trophy{width:240px;height:320px;display:flex;align-items:center;justify-content:center}
.pod-trophy img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 15px 35px rgba(0,0,0,.25));animation:fl 3.5s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.fin{width:100%;background:#fff;border:2px solid #1a237e;border-radius:14px;padding:15px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
.champ{font-size:1.8rem;font-weight:900;color:#1a237e;text-align:center;margin-top:10px}

/* MODAL */
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(6px);padding:15px}
.moc{background:#fff;width:100%;max-width:1100px;padding:30px;border-radius:24px;max-height:95vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.3)}
.moc textarea{width:100%;border:1px solid #ddd;border-radius:10px;padding:12px;font-size:.85rem;resize:vertical}
.mtbl{width:100%;border-collapse:collapse;margin-top:15px}
.mtbl th{text-align:left;padding:10px;border-bottom:2px solid #e0e0e0;font-size:.7rem;text-transform:uppercase;color:#999}
.mtbl td{padding:8px 10px;border-bottom:1px solid #eee;font-size:.8rem}
.mtbl input{border:1px solid #ddd;padding:6px 10px;border-radius:6px;width:100%;font-size:.8rem}
.mtbl select{border:1px solid #ddd;padding:6px;border-radius:6px;font-size:.8rem}

.anim{animation:fadeUp .4s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:992px){
  .tg{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .nav .logo{font-size:1.1rem}
  .btn span{display:none}
}
@media(max-width:768px){
  .nav{flex-direction:column;gap:15px;padding:15px}
  .wrap{padding:15px 10px}
  .tg{grid-template-columns:1fr}
  .moc{padding:20px}
  .moc-grid{grid-template-columns:1fr !important}
  .home-grid-layout{grid-template-columns:1fr !important}
  .bk-wrap{zoom:0.65; min-width: 1000px; justify-content: start; padding: 15px;}
}


</style>

const CLR=['#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa','#00897b','#f4511e','#3949ab'];
function TeamLogo({logo,name,sz=28}){
  const[ok,setOk]=useState(true);
  const bg=CLR[name.charCodeAt(0)%CLR.length];
  if(!ok||!logo)return <span style={{width:sz,height:sz,borderRadius:4,background:bg,display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:sz*.45,flexShrink:0}}>{name.charAt(0).toUpperCase()}</span>;
  return <img src={logo} onError={()=>setOk(false)} style={{width:sz,height:sz,objectFit:'contain',borderRadius:4,flexShrink:0}}/>;
}

function App(){
  const[view,setView]=useState('HOME');
  const[db,setDb]=useState(()=>{const s=localStorage.getItem('CM_DB10');return s?JSON.parse(s):SEED});
  const[cup,setCup]=useState(null);
  const[sel,setSel]=useState([]);
  const[br,setBr]=useState(null);
  const[admin,setAdmin]=useState(false);
  const[imp,setImp]=useState('');
  const[saved,setSaved]=useState(()=>{const s=localStorage.getItem('CM_SAVES');return s?JSON.parse(s):[]});
  const[qAdmin,setQAdmin]=useState('');

  useEffect(()=>{localStorage.setItem('CM_DB10',JSON.stringify(db))},[db]);
  useEffect(()=>{localStorage.setItem('CM_SAVES',JSON.stringify(saved))},[saved]);

  useEffect(()=>{setTimeout(()=>{if(window.lucide)window.lucide.createIcons()},100)});

  const gen=()=>{const s=[...sel].sort(()=>Math.random()-.5);const is8=cup.size===8;
    setBr({name:cup.name,img:cup.img,r16:is8?[]:s,qf:is8?s:Array(8).fill(null),sf:Array(4).fill(null),f:Array(2).fill(null),w:null});setView('BK')};

  const adv=(t,r,i)=>{if(!t)return;const n={...br};
    if(r==='r16')n.qf[i]=t;else if(r==='qf')n.sf[i]=t;else if(r==='sf')n.f[i]=t;else if(r==='f')n.w=t;setBr(n)};

  const doImport=()=>{const nw=imp.split('\n').map(l=>{const p=l.split(',');if(p[0]&&p[1])return{id:Date.now()+Math.random(),name:p[0].trim(),logo:p[1].trim(),cat:(p[2]||'Nacional').trim()};return null}).filter(Boolean);setDb([...db,...nw]);setImp('')};

  const exportTeams=()=>{
    const csv='Nombre,Logo,Categoria\n'+db.map(t=>`${t.name},${t.logo},${t.cat}`).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Equipos_ChampionshipMaster.csv';a.click();
  };

  const delTeam=(id)=>setDb(prev=>prev.filter(t=>t.id!==id));

  const copyLink=()=>{
    navigator.clipboard.writeText(window.location.href);
    alert('🔗 Enlace de la aplicación copiado al portapapeles');
  };

  const printBK=()=>window.print();

  // --- EXPORT / IMPORT TORNEOS ---
  const exportBracket=()=>{
    if(!br||!cup)return;
    const data={v:1,cup,br,sel,ts:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=(cup.name.replace(/\s+/g,'_'))+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };

  const saveBracket=()=>{
    if(!br||!cup)return;
    const entry={id:Date.now(),name:cup.name,img:cup.img,cup,br,sel,ts:new Date().toLocaleString('es-CL'),winner:br.w?.name||null};
    setSaved(prev=>[entry,...prev].slice(0,20));
    alert('✅ Campeonato guardado correctamente');
  };

  const loadSave=(s)=>{
    setCup(s.cup);setSel(s.sel);setBr(s.br);setView('BK');
  };

  const deleteSave=(id)=>setSaved(prev=>prev.filter(s=>s.id!==id));

  const importFile=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.v===1&&d.cup&&d.br){setCup(d.cup);setSel(d.sel||[]);setBr(d.br);setView('BK');}
        else alert('Archivo inválido');
      }catch{alert('Error al leer el archivo');}
    };r.readAsText(f);
    e.target.value='';
  };

  const M=({t1,t2,onW,wId})=>(
    <div className="mc">
      <div className={`tr ${wId===t1?.id&&t1?'w':''}`} onClick={()=>onW(t1)}>
        <img src={t1?.logo} className="fl" onError={e=>{e.target.style.display='none'}}/>
        <span className="tn">{t1?.name||'—'}</span>
      </div>
      <div className={`tr ${wId===t2?.id&&t2?'w':''}`} onClick={()=>onW(t2)}>
        <img src={t2?.logo} className="fl" onError={e=>{e.target.style.display='none'}}/>
        <span className="tn">{t2?.name||'—'}</span>
      </div>
    </div>
  );

  return(<>
    <nav className="nav">
      <div className="logo" onClick={()=>setView('HOME')}><i data-lucide="trophy"></i> CHAMPIONSHIP MASTER</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
        <button className="btn btn-o" onClick={copyLink} title="Copiar enlace de la app"><i data-lucide="share-2" style={{width:16,height:16}}></i> <span>Compartir</span></button>
        <label className="btn btn-g" style={{cursor:'pointer'}} title="Importar archivo .json">
          <i data-lucide="upload" style={{width:16,height:16}}></i> <span>Importar</span>
          <input type="file" accept=".json" style={{display:'none'}} onChange={importFile}/>
        </label>
        {view==='BK'&&<>
          <button className="btn btn-p" onClick={printBK} title="Imprimir o Guardar PDF"><i data-lucide="printer" style={{width:16,height:16}}></i> <span>Imprimir</span></button>
          <button className="btn btn-s" onClick={saveBracket} title="Guardar en historial">
            <i data-lucide="save" style={{width:16,height:16}}></i> <span>Guardar</span>
          </button>
          <button className="btn btn-g" onClick={exportBracket} title="Exportar como archivo .json">
            <i data-lucide="download" style={{width:16,height:16}}></i> <span>Exportar</span>
          </button>
        </>}
        <button className="btn btn-o" onClick={()=>setAdmin(true)}><i data-lucide="settings" style={{width:16,height:16}}></i> <span>Mantenedor</span></button>
        <button className="btn btn-p" onClick={()=>setView('HOME')}><i data-lucide="home" style={{width:16,height:16}}></i> <span>Inicio</span></button>
      </div>
    </nav>
    <div className="wrap">
      {view==='HOME'&&<div className="anim">
        <h1 style={{textAlign:'center',fontSize:'2.5rem',marginBottom:10}}>SIMULA TU CAMPEONATO</h1>
        <p style={{textAlign:'center',color:'#888',marginBottom:10}}>Elige un torneo y arma tus llaves</p>
        <div className="tg">{CUPS.map(c=>(
          <div key={c.id} className="tc" onClick={()=>{setCup(c);setSel([]);setView('SEL')}}>
            <div className="ti"><img src={c.img} alt={c.name}/></div>
            <h3>{c.name}</h3>
            <p>{c.size} Equipos • {c.type}</p>
            <button className="btn btn-p" style={{width:'100%'}}>Iniciar</button>
          </div>
        ))}</div>

        <div className="home-grid-layout" style={{display:'grid',gridTemplateColumns:'1fr 350px',gap:30,marginTop:40}}>
          <div>
            <h2 style={{fontSize:'1.4rem',fontWeight:800,marginBottom:15,display:'flex',alignItems:'center',gap:8}}>
              🏅 Torneos Guardados <span style={{fontSize:'.85rem',color:'#888',fontWeight:400}}>({saved.length})</span>
            </h2>
            {saved.length===0?<p style={{color:'#999',fontSize:'.9rem',background:'#fff',padding:20,borderRadius:15,textAlign:'center',border:'1px dashed #ccc'}}>No hay torneos guardados aún.</p>:(
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:12}}>
                {saved.map(s=>(
                  <div key={s.id} className="tc-save" style={{background:'#fff',borderRadius:14,padding:16,boxShadow:'0 2px 12px rgba(0,0,0,.08)',border:'1px solid #eee',display:'flex',gap:12,alignItems:'center'}}>
                    <img src={s.img} style={{width:48,height:48,objectFit:'contain'}} onError={e=>e.target.style.display='none'}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:'.9rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.name}</div>
                      <div style={{fontSize:'.7rem',color:'#888'}}>{s.ts}</div>
                      {s.winner&&<div style={{fontSize:'.75rem',color:'#1b5e20',fontWeight:700,marginTop:2}}>🏆 {s.winner}</div>}
                    </div>
                    <div style={{display:'flex',gap:5}}>
                      <button className="btn btn-p" style={{padding:'6px',minWidth:30}} onClick={()=>loadSave(s)} title="Abrir"><i data-lucide="eye" style={{width:14,height:14}}></i></button>
                      <button className="btn btn-r" style={{padding:'6px',minWidth:30}} onClick={()=>deleteSave(s.id)} title="Borrar"><i data-lucide="trash-2" style={{width:14,height:14}}></i></button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{background:'#1a237e',color:'#fff',padding:25,borderRadius:20,boxShadow:'0 10px 30px rgba(26,35,126,0.2)'}}>
            <h2 style={{fontSize:'1.2rem',fontWeight:800,marginBottom:15,display:'flex',alignItems:'center',gap:8}}>
              🏆 SALÓN DE LA FAMA
            </h2>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {saved.filter(s=>s.winner).slice(0,5).map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,background:'rgba(255,255,255,0.1)',padding:10,borderRadius:12}}>
                  <div style={{fontSize:'1.2rem'}}>🥇</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:'.85rem'}}>{s.winner}</div>
                    <div style={{fontSize:'.65rem',opacity:0.7}}>{s.name}</div>
                  </div>
                </div>
              ))}
              {saved.filter(s=>s.winner).length===0&&<p style={{fontSize:'.8rem',opacity:0.6,textAlign:'center'}}>¡Simula un torneo para coronar a un campeón!</p>}
            </div>
          </div>
        </div>
      </div>}

      {view==='SEL'&&<div className="anim sp">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:25}}>
          <button className="btn btn-o" onClick={()=>setView('HOME')}>← Atrás</button>
          <h2 style={{fontSize:'1.6rem'}}>{cup.name}</h2>
          <button className="btn btn-p" disabled={sel.length<cup.size} onClick={gen}>Generar Llaves ⚡</button>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <h3>Seleccionados: <span style={{color:'#1a237e'}}>{sel.length} / {cup.size}</span></h3>
          <button className="btn btn-o" onClick={()=>setSel(db.filter(x=>x.cat===cup.type).slice(0,cup.size))}>Autocompletar</button>
        </div>
        <div className="sg">{db.filter(t=>t.cat===cup.type).map(t=>(
          <div key={t.id} className={`si ${sel.find(x=>x.id===t.id)?'on':''}`} onClick={()=>{
            if(sel.find(x=>x.id===t.id))setSel(sel.filter(x=>x.id!==t.id));
            else if(sel.length<cup.size)setSel([...sel,t])}}>
            <TeamLogo logo={t.logo} name={t.name}/>
            <span style={{fontWeight:600,fontSize:'.85rem'}}>{t.name}</span>
          </div>
        ))}</div>
      </div>}

      {view==='BK'&&<div className="anim bk-bg" style={{backgroundImage:`url(${cup.bg})`}}>
        <div className="bk-bg-overlay">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:15}}>
          <button className="btn btn-o" onClick={()=>setView('SEL')}>← Editar</button>
          <h2 style={{fontSize:'2rem',fontWeight:900,textTransform:'uppercase',color:cup.color,textShadow:'0 2px 4px rgba(255,255,255,0.8)'}}>{br.name}</h2>
          <button className="btn btn-p" onClick={()=>setView('HOME')}>+ Nuevo</button>
        </div>
        <div className="bk-wrap">
          <div className="bk-side">
            {cup.size===16&&<div className="rd"><div className="rd-lb">Octavos</div>
              {[0,1,2,3].map(i=><M key={i} t1={br.r16[i*2]} t2={br.r16[i*2+1]} onW={t=>adv(t,'r16',i)} wId={br.qf[i]?.id}/>)}</div>}
            <div className="rd"><div className="rd-lb">Cuartos</div>
              {[0,1].map(i=><M key={i} t1={br.qf[i*2]} t2={br.qf[i*2+1]} onW={t=>adv(t,'qf',i)} wId={br.sf[i]?.id}/>)}</div>
            <div className="rd"><div className="rd-lb">Semis</div>
              <M t1={br.sf[0]} t2={br.sf[1]} onW={t=>adv(t,'sf',0)} wId={br.f[0]?.id}/></div>
          </div>

          <div className="pod">
            <div className="pod-trophy"><img src={br.img} alt="Copa"/></div>
            <div className="fin"><div className="rd-lb">La Gran Final</div>
              <M t1={br.f[0]} t2={br.f[1]} onW={t=>adv(t,'f',0)} wId={br.w?.id}/></div>
            {br.w&&<div className="champ anim">🏆 {br.w.name} 🏆</div>}
          </div>

          <div className="bk-side rev">
            {cup.size===16&&<div className="rd"><div className="rd-lb">Octavos</div>
              {[4,5,6,7].map(i=><M key={i} t1={br.r16[i*2]} t2={br.r16[i*2+1]} onW={t=>adv(t,'r16',i)} wId={br.qf[i]?.id}/>)}</div>}
            <div className="rd"><div className="rd-lb">Cuartos</div>
              {[2,3].map(i=><M key={i} t1={br.qf[i*2]} t2={br.qf[i*2+1]} onW={t=>adv(t,'qf',i)} wId={br.sf[i]?.id}/>)}</div>
            <div className="rd"><div className="rd-lb">Semis</div>
              <M t1={br.sf[2]} t2={br.sf[3]} onW={t=>adv(t,'sf',1)} wId={br.f[1]?.id}/></div>
          </div>
        </div>{/* bk-wrap */}
        </div>{/* bk-bg-overlay */}
      </div>}{/* bk-bg / BK view */}
    </div>{/* wrap */}

    {admin&&<div className="mo" onClick={()=>setAdmin(false)}>
      <div className="moc anim" onClick={e=>e.stopPropagation()} style={{maxWidth:1000}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h2 style={{fontSize:'1.8rem',fontWeight:800}}>MANTENEDOR DE EQUIPOS</h2>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-g" onClick={exportTeams}><i data-lucide="download" style={{width:14,height:14}}></i> Exportar CSV</button>
            <button className="btn btn-o" onClick={()=>setAdmin(false)}>✕ Cerrar</button>
          </div>
        </div>
        <div className="moc-grid" style={{display:'grid',gridTemplateColumns:'350px 1fr',gap:25}}>
          <div style={{background:'#f8f9fa',padding:20,borderRadius:12}}>
            <h3 style={{marginBottom:8,fontSize:'.9rem'}}>Importación Masiva</h3>
            <p style={{fontSize:'.7rem',color:'#666',marginBottom:10}}>Formato: Nombre, URL Logo, Categoría</p>
            <textarea style={{height:250}} value={imp} onChange={e=>setImp(e.target.value)} placeholder={"Argentina, https://flagcdn.com/ar.png, Nacional"}/>
            <button className="btn btn-p" style={{width:'100%',marginTop:10}} onClick={doImport}>Cargar Equipos</button>
          </div>
          <div>
            <div style={{display:'flex',gap:10,marginBottom:15}}>
              <input type="text" placeholder="Buscar equipo..." style={{padding:'8px 12px',flex:1}} value={qAdmin} onChange={e=>setQAdmin(e.target.value)}/>
              <select style={{width:150,padding:'8px'}} onChange={e=>setQAdmin(e.target.value)}>
                <option value="">Todas Categorías</option>
                <option value="Nacional">Mundial</option>
                <option value="Club">Libertadores</option>
                <option value="EuroClub">Champions</option>
                <option value="AmNacional">Copa América</option>
                <option value="EuroNacional">Eurocopa</option>
              </select>
            </div>
            <div style={{height:400,overflowY:'auto',background:'#fff',border:'1px solid #eee',borderRadius:10}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead style={{position:'sticky',top:0,background:'#f4f4f4',fontSize:'.7rem',zIndex:5}}>
                  <tr>
                    <th style={{padding:8,textAlign:'left'}}>Escudo</th>
                    <th style={{padding:8,textAlign:'left'}}>Nombre</th>
                    <th style={{padding:8,textAlign:'left'}}>Cat</th>
                    <th style={{padding:8,textAlign:'center'}}>Acción</th>
                  </tr>
                </thead>
                <tbody>
                  {db.filter(t=>t.name.toLowerCase().includes(qAdmin.toLowerCase())||t.cat.toLowerCase().includes(qAdmin.toLowerCase())).map(t=>(
                    <tr key={t.id} style={{borderBottom:'1px solid #eee'}}>
                      <td style={{padding:8}}><TeamLogo logo={t.logo} name={t.name} sz={24}/></td>
                      <td style={{padding:8,fontSize:'.8rem',fontWeight:600}}>{t.name}</td>
                      <td style={{padding:8,fontSize:'.7rem',color:'#666'}}>{t.cat}</td>
                      <td style={{padding:8,textAlign:'center'}}><button onClick={()=>delTeam(t.id)} style={{border:'none',background:'none',color:'#c62828',cursor:'pointer',fontSize:'1.2rem'}}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
